  <text x="300" y="150" text-anchor="middle" fill="#919191" font-family="monospace" font-size="10">Teamet deployar med förtroende — varje dag, flera gånger</text>
  <rect x="40" y="190" width="160" height="80" rx="6" fill="#1F1F1F" stroke="#22C55E" stroke-width="1"/>
