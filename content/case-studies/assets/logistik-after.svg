  <text x="120" y="245" text-anchor="middle" fill="#919191" font-family="monospace" font-size="10">Deploy-frekvens</text>
  <text x="120" y="260" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="9">↑ 2700%</text>
  <rect x="220" y="190" width="160" height="80" rx="6" fill="#1F1F1F" stroke="#22C55E" stroke-width="1"/>
  <text x="300" y="220" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="14" font-weight="700">2 dagar</text>
  <text x="300" y="245" text-anchor="middle" fill="#919191" font-family="monospace" font-size="10">Lead time</text>
  <text x="300" y="260" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="9">↓ 86%</text>
  <rect x="400" y="190" width="160" height="80" rx="6" fill="#1F1F1F" stroke="#22C55E" stroke-width="1"/>
  <text x="480" y="220" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="14" font-weight="700">98%</text>
  <text x="480" y="245" text-anchor="middle" fill="#919191" font-family="monospace" font-size="10">Build-success</text>
  <text x="480" y="260" text-anchor="middle" fill="#22C55E" font-family="monospace" font-size="9">↑ 145%</text>
