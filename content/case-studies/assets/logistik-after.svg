<svg viewBox="0 0 600 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Efter: Stabiliserad pipeline med 98% build-success och 4 deploys per dag">
  <rect width="600" height="300" rx="8" fill="#1A1A1A"/>
  <rect x="40" y="30" width="100" height="50" rx="6" fill="#22C55E" opacity="0.8"/>
  <text x="90" y="60" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="11" font-weight="600">Git Push</text>
  <line x1="140" y1="55" x2="165" y2="55" stroke="#22C55E" stroke-width="2"/>
  <rect x="165" y="30" width="80" height="50" rx="6" fill="#22C55E" opacity="0.6"/>
  <text x="205" y="52" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10">Lint</text>
  <text x="205" y="68" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="9" opacity="0.7">✓ Auto</text>
  <line x1="245" y1="55" x2="265" y2="55" stroke="#22C55E" stroke-width="2"/>
  <rect x="265" y="30" width="80" height="50" rx="6" fill="#22C55E" opacity="0.6"/>
  <text x="305" y="52" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10">Test</text>
  <text x="305" y="68" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="9" opacity="0.7">✓ 98%</text>
  <line x1="345" y1="55" x2="365" y2="55" stroke="#22C55E" stroke-width="2"/>
  <rect x="365" y="30" width="80" height="50" rx="6" fill="#22C55E" opacity="0.6"/>
  <text x="405" y="52" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10">Build</text>
  <text x="405" y="68" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="9" opacity="0.7">✓ Auto</text>
  <line x1="445" y1="55" x2="465" y2="55" stroke="#22C55E" stroke-width="2"/>
  <rect x="465" y="30" width="95" height="50" rx="6" fill="#22C55E" opacity="0.8"/>
  <text x="512" y="52" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="10" font-weight="600">Deploy</text>
  <text x="512" y="68" text-anchor="middle" fill="#FFFFFF" font-family="monospace" font-size="9" opacity="0.7">Blue-Green</text>
  <rect x="40" y="110" width="520" height="50" rx="6" fill="none" stroke="#22C55E" stroke-width="1"/>
